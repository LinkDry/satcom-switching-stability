### LlamaFactory LoRA fine-tuning config for Qwen3.5-4B
### Task: KPI → reward weights for satellite beam scheduling

### Model
model_name_or_path: Qwen/Qwen3-4B
quantization_bit: 4
quantization_method: bitsandbytes

### LoRA
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### Dataset
dataset_dir: .
dataset: satcom_mdp
eval_dataset: satcom_mdp_val
template: qwen3

### Training
stage: sft
do_train: true
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
max_grad_norm: 1.0
max_length: 512
logging_steps: 10
save_steps: 100
eval_steps: 100
eval_strategy: steps

### Output
output_dir: ../models/qwen3-4b-satcom-lora
report_to: none
